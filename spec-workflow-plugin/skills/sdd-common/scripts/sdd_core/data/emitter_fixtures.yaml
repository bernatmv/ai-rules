# Emitter parse-gate fixtures — one row per build_* emitter in
# sdd_core.command_templates.__all__. Each row gives the lint enough
# input to render the literal and assert ordering invariants.
# Why: the lint catches parent-flag-after-subcommand drift the moment
# an emitter is changed, instead of waiting on a downstream argparse
# failure to surface ``required: --target``.
#
# Schema (per emitter):
#   kwargs:                 mapping passed to the builder
#   expected_dispatch_script:  group/script.py the literal must point at
#   parent_only_flags:      tokens that must appear BEFORE any positional
#                            (subcommand) token in the rendered argv
#                            (e.g. flags registered on the parent parser
#                            via cli.target_argument / strict_parser)
#   skip:                   reason — opt out (compound emitters / dict
#                            returners that the parse-gate cannot model)
#
emitters:
  build_shim_command:
    skip: "Lower-level primitive — every other emitter delegates to it; covered transitively by their fixtures."
  build_baseline_refresh_command:
    kwargs:
      rule_id: "no-shell-true"
    expected_dispatch_script: "internal_lints/baseline-refresh.py"
  build_internal_lint_command:
    kwargs:
      rule_id: "no-shell-true"
    expected_dispatch_script: "internal_lints/no_shell_true.py"
  build_template_repair_command:
