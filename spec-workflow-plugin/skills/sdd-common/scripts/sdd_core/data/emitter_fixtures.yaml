      repo_id: "repo-a"
      doc: "requirements"
      status: "validated"
    expected_dispatch_script: "workspace/update-tracker.py"
  build_workspace_phase_approve_command:
    kwargs:
      feature: "feat-1"
      doc: "requirements"
    expected_dispatch_script: "workspace/phase-approve.py"
    parent_only_flags: ["--target"]
  build_workspace_update_manifest_command:
    kwargs:
      feature: "feat-1"
      subcommand: "set-repo-role"
      repo_id: "repo-a"
