# Batch-hygiene pattern rows — single source of truth for
# `internal_lints/skill_md_batch_hygiene.py`.
#
# Each row is one rule. The lint walks every bash-fenced example in
# SKILL.md / reference docs and emits one finding per matched row.
# Adding a new rule is a YAML edit — the lint code stays untouched.
#
# Schema:
#   patterns:
#     - kind: <string>          # finding.kind reported in the envelope
#       regex: <PCRE>           # applied to each non-empty bash line
#       message: <string>       # remediation text
#       requires: [<string>]    # optional — every regex must match
#       forbids: [<string>]     # optional — none of these may match
#
# Defence-in-depth rules carried over from
# `parallel-batch-hygiene.md`. Rule 5 catches unmasked compound
# discovery probes.

patterns:
  - kind: compound_discovery_unmasked_exit
    regex: '\bwhich\s+\S+(?:\s+\S+){2,}'
    forbids:
      - '\|\|\s*true\b'
      - ';\s*true\b'
      - '\}\s*\|\|\s*true\b'
    message: |-
      Compound `which` probes return the OR of every sub-command's
      exit code — append `|| true` (or wrap as `{ ...; } || true`)
      so a single missing binary does not cancel parallel batch
      siblings. See $SKILLS/sdd-common/references/parallel-batch-
      hygiene.md § Rule 5.
