# Per-phase inner-flag schema for ``review/pipeline-tick.py``.
#
# Every flag the dispatcher passes after the ``--`` separator must be
# allowlisted under the target phase's ``required`` or ``optional``
# list. Used by ``sdd_core.phase_inner_flags`` for emitter-parse
# validation and by ``review.pipeline_phases._envelope.validate_next_action_command``.
#
# Lifecycle flags (``--parent-todo``, ``--gate-id``, ``--category``,
# ``--target-name``, ``--workspace``) are owned by the parent
# parser and are auto-injected by the dispatcher. They are listed
# here so phase-specific lints can flag duplicates rather than
# silently allowing them in the inner tail.
schema_version: 1
phases:
  launch:
    required:
      - "--review-skill"
      - "--doc-list"
    optional:
      - "--scope"
      - "--workflow-mode"
      - "--max-fix-cycles"
      - "--confirm-continuation"
      - "--parent-todo"
      - "--gate-id"
  post-fix:
    required:
      - "--doc-list"
      - "--user-choice"
    optional:
      - "--fix-cycle"
      - "--max-cycles"
      - "--workflow-mode"
      - "--parent-todo"
      - "--gate-id"
  update-launch:
    required:
      - "--doc-list"
    optional:
      - "--review-skill"
      - "--scope"
      - "--workflow-mode"
      - "--parent-todo"
      - "--gate-id"
  post-review:
    required: []
    optional:
      - "--parent-todo"
      - "--gate-id"
  check-revalidation:
    required:
      - "--doc"
    optional:
      - "--fix-cycle"
      - "--max-cycles"
      - "--parent-todo"
      - "--gate-id"
  pre-approval:
    required: []
    optional:
      - "--doc-list"
      - "--parent-todo"
      - "--gate-id"
  ack-calls:
    required: []
    optional:
      - "--parent-todo"
      - "--gate-id"
  ack-advisories:
    required: []
    optional:
      - "--parent-todo"
      - "--gate-id"
  ack-post-change-review:
    required: []
    optional:
      - "--parent-todo"
      - "--gate-id"
  ack-reference-reads:
    required:
      - "--references"
    optional:
      - "--parent-todo"
      - "--gate-id"
  pre-launch-check:
    required:
      - "--doc"
    optional:
      - "--parent-todo"
      - "--gate-id"
  reset-reference-acks:
    required: []
    optional:
      - "--parent-todo"
      - "--gate-id"
  complete:
    required: []
    optional:
      - "--parent-todo"
      - "--gate-id"
  code-review-launch:
    required: []
    optional:
      - "--review-skill"
      - "--doc-list"
      - "--scope"
      - "--parent-todo"
      - "--gate-id"

# Canonical concept-to-flag bindings. Reference docs and emitters use
# these names; deprecated aliases continue to parse on argparse via
# explicit ``add_argument`` aliases for one release.
canonical_flags:
  feature_or_spec: "--target"
  workspace_path: "--workspace"
  document: "--doc"
  document_list: "--doc-list"

# Flags that argparse currently accepts as aliases of the canonical
# names. Drop a row when the deprecation window closes.
deprecated_aliases:
  "--target":
    - "--target-name"
    - "--feature"
    - "--spec-name"
  "--workspace":
    - "--project-path"
