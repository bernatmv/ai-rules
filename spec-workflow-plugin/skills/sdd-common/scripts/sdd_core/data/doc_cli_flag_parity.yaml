# Doc → script flag parity rules.
# Each entry binds a reference doc to the canonical script invocation it cites.
# Loaded by sdd_core.doc_cli_parity (mirror of skill_md_rules /
# requirements_antipatterns loader idiom).
parity:
  - reference: references/prompt-suffix-canonical.md
    script: util/render-task-prompts.py
    required_flags: ["--target"]
    forbidden_flags: ["--spec-name"]
    reason: "Script renamed --spec-name -> --target; doc must mirror script"
