# design_antipatterns.yaml — minimum viable rules surfaced by retro
# review of cross-repo workspace specs. Future rules ship as YAML edits
# only; the linter (sdd_core.design_validation.validate) reads this
# file at runtime.

rules:
  - id: acceptance-criteria-as-design
    severity: error
    message: >-
      design.md contains EARS-style acceptance criteria
      (`WHEN ... THEN system SHALL ...`). Acceptance criteria belong in
      requirements.md; design owns the *how*, not the *what*.
    suggestion: >-
      Move the criterion to requirements.md and describe the design
      response (component, data flow, decision rationale) here instead.

  - id: task-list-as-design
    severity: error
    message: >-
      design.md contains task-list checkboxes (`- [ ]` / `- [x]`).
      Tasks belong in tasks.md; design.md describes the system, not
      the work.
    suggestion: >-
      Replace the checkbox list with prose / a component diagram /
      a sequence section, then move actionable items into tasks.md.

  - id: prose-only-no-component-headers
    severity: warning
    message: >-
      design.md has no sub-section headers below H1. A design must
      enumerate its components / decisions; one prose blob is hard to
      review and harder to maintain.
    suggestion: >-
      Add at least one H2/H3 (e.g. `## Components`, `## Data Model`,
      `## Sequencing`) to break the design into review-sized chunks.
